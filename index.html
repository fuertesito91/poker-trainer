<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1b6b3a">
  <meta name="description" content="Offline Texas Hold'em Poker Trainer — Learn hand reading, pot odds, and betting strategy.">
  <title>Poker Trainer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
 <body>
  <div class="shell">
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>♠️ <span>Poker</span> Trainer</h1>
      <div class="header-controls">
        <button id="btn-learn" class="btn-learn" aria-label="Open lessons">🎓 Learn</button>
        <button id="btn-coach" class="btn-coach" aria-label="Ask the AI coach">💬 Coach</button>
        <label class="difficulty-label">
          AI:
          <select id="difficulty" aria-label="AI difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <button id="btn-settings" aria-label="AI settings">⚙️</button>
        <button id="theme-toggle" aria-label="Toggle theme">🌓</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table">
      <!-- AI Zone -->
      <div class="player-zone">
        <span class="player-label">🤖 AI</span>
        <div class="cards-row" id="ai-cards">
          <span class="empty-cards">—</span>
        </div>
        <div class="player-meta">
          <span class="player-bet" id="ai-bet" hidden></span>
          <span class="player-chips" id="ai-chips">$1000</span>
        </div>
      </div>

      <!-- Community Cards -->
      <div class="community-zone">
        <div id="community-cards">
          <div class="card card-placeholder"><span>?</span></div>
          <div class="card card-placeholder"><span>?</span></div>
          <div class="card card-placeholder"><span>?</span></div>
          <div class="card card-placeholder"><span>?</span></div>
          <div class="card card-placeholder"><span>?</span></div>
        </div>
        <div class="pot-display" id="pot-display">Pot: $0</div>
        <div class="dealer-indicator" id="dealer-indicator">—</div>
      </div>

      <!-- Player Zone -->
      <div class="player-zone">
        <span class="player-label">🧑 You</span>
        <div class="cards-row" id="player-cards">
          <span class="empty-cards">—</span>
        </div>
        <div class="player-meta">
          <span class="player-bet" id="player-bet" hidden></span>
          <span class="player-chips" id="player-chips">$1000</span>
        </div>
      </div>

      <!-- Controls -->
      <div id="controls">
        <button id="btn-new-hand" class="btn btn-primary">New Hand</button>
        <button id="btn-reset" class="btn btn-secondary">Reset</button>
      </div>

      <!-- Info Bar -->
      <div class="info-bar">
        <div class="info-item">
          <span class="info-label">Hand:</span>
          <span class="info-value" id="handname-display">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Equity:</span>
          <span class="info-value" id="equity-display">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Pot Odds:</span>
          <span class="info-value" id="potodds-display">—</span>
        </div>
      </div>

      <!-- Hint Area -->
      <div id="hint-area"></div>

      <!-- Live Advisor / Coaching -->
      <div id="advisor-area"></div>

      <!-- Status -->
      <div id="status-area">Welcome! Click "New Hand" to start.</div>

      <!-- Showdown -->
      <div id="showdown-area"></div>

      <!-- Session Stats -->
      <div class="stats-wrap">
        <div id="stats-area" class="stats-bar"></div>
        <button id="btn-reset-stats" class="stats-reset" aria-label="Reset stats">Reset stats</button>
      </div>

      <!-- Per-street accuracy & leaks -->
      <details class="analysis-wrap">
        <summary class="history-toggle">📊 Analysis &amp; Leaks</summary>
        <div id="leaks-area" class="leaks-list"></div>
      </details>

      <!-- Hand History -->
      <details class="history-wrap">
        <summary class="history-toggle">📜 Hand History</summary>
        <div id="history-area" class="history-list"></div>
      </details>
    </div>
  </div>

  <!-- AI Coach dock (persistent side panel; collapses to a launcher) -->
  <aside id="coach-dock" class="coach-dock" aria-label="AI poker coach">
    <div class="coach-dock-head">
      <span id="coach-title">💬 AI Coach</span>
      <div class="coach-dock-actions">
        <button id="coach-voice" class="coach-icon-btn" aria-label="Toggle voice (read replies aloud)" title="Read replies aloud">🔈</button>
        <button id="coach-reset" class="coach-icon-btn" aria-label="Clear chat" title="Clear chat">🗑️</button>
        <button id="coach-min" class="coach-icon-btn" aria-label="Minimise coach" title="Minimise">▸</button>
      </div>
    </div>
    <div id="coach-messages" class="coach-messages"></div>
    <div class="coach-input-row">
      <button id="coach-mic" class="coach-mic" aria-label="Speak to the coach" title="Hold to talk">🎤</button>
      <input id="coach-input" class="coach-input" type="text" placeholder="Ask the coach…" autocomplete="off">
      <button id="coach-send" class="btn btn-primary">Send</button>
    </div>
  </aside>
  </div><!-- /.shell -->

  <!-- Floating launcher shown when the dock is minimised -->
  <button id="coach-launcher" class="coach-launcher" aria-label="Open AI coach" hidden>💬</button>

  <!-- Lessons / Curriculum overlay -->
  <div id="lesson-overlay" class="lesson-overlay" role="dialog" aria-modal="true" aria-label="Poker lessons" hidden>
    <div class="lesson-modal">
      <div class="lesson-modal-head">
        <span id="lesson-title">Learn Poker</span>
        <button id="lesson-close" class="lesson-close" aria-label="Close lessons">✕</button>
      </div>
      <div id="lesson-body" class="lesson-body"></div>
      <div id="lesson-foot" class="lesson-foot"></div>
    </div>
  </div>

  <!-- AI Coach settings -->
  <div id="settings-overlay" class="lesson-overlay" role="dialog" aria-modal="true" aria-label="AI coach settings" hidden>
    <div class="lesson-modal">
      <div class="lesson-modal-head">
        <span>⚙️ AI Coach Settings</span>
        <button id="settings-close" class="lesson-close" aria-label="Close settings">✕</button>
      </div>
      <div id="settings-body" class="lesson-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // In local development the service worker would cache assets and hide fresh
    // code on refresh, so we DISABLE it on localhost (and tear down any SW/caches
    // a previous session installed). In production it registers as normal for
    // offline play.
    (function () {
      const isLocalDev = ['localhost', '127.0.0.1', '0.0.0.0', ''].includes(location.hostname);
      if (!('serviceWorker' in navigator)) return;

      if (isLocalDev) {
        // Remove any previously-installed worker and its caches so the dev server
        // always serves the latest files.
        navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
        if (window.caches) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        console.log('Dev mode: service worker disabled, caches cleared.');
        return;
      }

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Poker Trainer ready for offline play'))
          .catch(() => console.log('Service worker registration skipped'));
      });
    })();
  </script>
</body>
</html>
