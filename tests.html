<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Trainer — Tests</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #1a1a2e; color: #f0f0e8; padding: 20px; line-height: 1.5; }
    h1 { font-size: 1.2rem; }
    #summary { font-size: 1rem; font-weight: 700; margin: 12px 0; padding: 8px 12px; border-radius: 8px; }
    #summary.pass { background: #1b6b3a; }
    #summary.fail { background: #c0392b; }
    .case { font-size: 0.85rem; padding: 2px 0; }
    .case.ok::before { content: '✓ '; color: #7fe0a0; }
    .case.fail::before { content: '✗ '; color: #ef8a80; }
    .case.fail { color: #ef8a80; }
    .err { padding-left: 20px; opacity: 0.8; font-size: 0.78rem; }
  </style>
</head>
<body>
  <h1>🃏 Poker Trainer — Test Suite</h1>
  <div id="summary">Running…</div>
  <div id="output"></div>

  <script src="tests/harness.js"></script>
  <script src="app.js"></script>
  <script src="tests/tests.js"></script>
  <script>
    const r = globalThis.__TEST__.results;
    const out = document.getElementById('output');
    for (const c of r.cases) {
      const div = document.createElement('div');
      div.className = 'case ' + (c.ok ? 'ok' : 'fail');
      div.textContent = c.name;
      out.appendChild(div);
      if (!c.ok) {
        const e = document.createElement('div');
        e.className = 'err';
        e.textContent = c.error;
        out.appendChild(e);
      }
    }
    const s = document.getElementById('summary');
    s.textContent = `${r.passed} passed, ${r.failed} failed`;
    s.className = r.failed ? 'fail' : 'pass';
  </script>
</body>
</html>
